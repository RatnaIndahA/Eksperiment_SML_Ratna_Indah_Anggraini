name: Preprocess Adult Dataset

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # memungkinkan trigger manual

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Run preprocessing script
      run: |
        cd preprocessing
        python automate_Ratna_Indah_Anggraini.py

    - name: Upload artifact (hasil preprocessing)
      uses: actions/upload-artifact@v4
      with:
        name: adult_clean_dataset
        path: preprocessing/adult_preprocessing/adult_clean.csv

